<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>你好吗</title>
    <style>
         :root { --accent: #a29bfe; --safe: #55efc4; --warning: #ffeaa7; --danger: #ff7675; --crisis: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { width: 100%; overflow-x: hidden; overscroll-behavior-y: none; }
        
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e) no-repeat fixed;
            color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh;
            -webkit-font-smoothing: antialiased; -webkit-overflow-scrolling: touch;
        }

        .container { width: 92%; max-width: 440px; margin: 0 auto; padding: 40px 0; display: flex; flex-direction: column; }

        .glass {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 35px;
            padding: 30px 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-bottom: 20px;
        }

        .music-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px;
            font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
        }

        .header-title { font-size: 2.4rem; font-weight: 200; letter-spacing: 10px; margin-bottom: 10px; }
        .header-sub { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 40px; }

        .entry {
            background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 22px;
            margin: 15px 0; text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
        }

        .ctrl-bar { display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 0.8rem; color: rgba(255,255,255,0.4); }
        .ctrl-btn { padding: 5px 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; }

        .btn-opt { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 18px; background: rgba(255,255,255,0.08); color: #fff; font-size: 1rem; cursor: pointer; text-align: left; outline: none; }
        .btn-opt:active { background: var(--accent); }

        .btn-main { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #fff; border: none; padding: 20px; border-radius: 25px; width: 100%; font-weight: 600; font-size: 1.1rem; margin-top: 20px; cursor: pointer; outline: none; }
        .btn-sub { background: transparent; color: rgba(255,255,255,0.4); border: none; padding: 10px; font-size: 0.85rem; cursor: pointer; margin-top: 10px; text-decoration: underline; }

        textarea { width: 100%; height: 160px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; color: #fff; margin: 20px 0; outline: none; resize: none; font-size: 1rem; -webkit-appearance: none; }
        
        .score-val { font-size: 4rem; font-weight: 200; color: var(--accent); margin: 0; }
        .level-tag { font-size: 1.3rem; font-weight: 600; margin: 5px 0 15px 0; letter-spacing: 2px; }
        .source-tag { font-size: 0.65rem; color: rgba(255,255,255,0.3); margin-top: 10px; }

        /* 危机干预卡片 */
        .crisis-card {
            background: rgba(255, 71, 87, 0.15); border: 1px solid var(--crisis); border-radius: 15px;
            padding: 15px; margin-top: 20px; text-align: left; display: none;
        }
        .crisis-title { color: var(--crisis); font-weight: bold; margin-bottom: 5px; font-size: 0.95rem; }
        .crisis-text { font-size: 0.85rem; line-height: 1.5; opacity: 0.9; }

        #pay-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .pay-card { width: 310px; background: #fff; border-radius: 30px; padding: 30px; color: #333; text-align:center; transform: translateZ(0); }
        .qr-img { width: 220px; height: 220px; margin: 20px auto; display: block; border: 1px solid #eee; }

        #p-echo { text-align: left; line-height: 2.2; font-size: 1.05rem; display: none; color: rgba(255,255,255,0.9); }
        .letter-content { white-space: pre-wrap; margin-bottom: 30px; text-align: justify; }
    </style>
</head>
<body>

<div class="music-toggle" id="m-btn" onclick="toggleMusic()">🎵 开启静谧旋律</div>
<audio id="bgm" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div id="p-home">
        <h1 class="header-title">你好吗</h1>
        <p class="header-sub">世界很吵，这里只听你的。</p>
        <div class="entry" onclick="runStart('PHQ9')">
            <div><b>抑郁深度复诊</b><br><small style="opacity:0.4">基于PHQ-9量表</small></div>
            <div style="color:var(--accent);">推开门 ➔</div>
        </div>
        <div class="entry" onclick="runStart('GAD7')">
            <div><b>焦虑情绪捕手</b><br><small style="opacity:0.4">基于GAD-7量表</small></div>
            <div style="color:var(--accent);">推开门 ➔</div>
        </div>
        <div class="entry" onclick="runStart('PSS10')">
            <div><b>生活压力感知</b><br><small style="opacity:0.4">基于PSS-10量表</small></div>
            <div style="color:var(--accent);">推开门 ➔</div>
        </div>
    </div>

    <div id="p-test" class="glass" style="display:none;">
        <div class="ctrl-bar">
            <div class="ctrl-btn" onclick="runBack()">↩ 重新回答上一题</div>
            <div class="ctrl-btn" onclick="resetToHome()">✖ 终止测评</div>
        </div>
        <div id="q-txt" style="min-height:100px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; padding:0 10px;"></div>
        <div id="opts">
            <button class="btn-opt" onclick="runStep(0)">完全没有</button>
            <button class="btn-opt" onclick="runStep(1)">有几天</button>
            <button class="btn-opt" onclick="runStep(2)">超过一半时间</button>
            <button class="btn-opt" onclick="runStep(3)">几乎天天</button>
        </div>
    </div>

    <div id="p-report" class="glass" style="display:none;">
        <p style="font-size:0.8rem; opacity:0.5;">测评得分</p>
        <div id="dom-score" class="score-val">0</div>
        <div id="dom-level" class="level-tag"></div>
        
        <div id="dom-crisis" class="crisis-card">
            <div class="crisis-title">⚠️ 医疗提示</div>
            <div class="crisis-text">监测到您的情绪可能处于高负荷状态。请答应我，不要独自硬扛。如果感到痛苦无法承受，请务必前往医院寻求专业医师的帮助。您非常重要，世界不能没有您。</div>
        </div>

        <div style="width:100%; height:240px; position:relative; overflow:hidden; margin-top:10px;">
            <canvas id="dom-radar" style="width:300px; height:240px; margin:0 auto;"></canvas>
        </div>
        <div id="dom-diag" style="text-align:left; font-size:0.95rem; background:rgba(0,0,0,0.2); padding:15px; border-radius:15px; margin-top:10px; line-height: 1.6;"></div>
        <div class="source-tag">依据国际通用医学筛查量表标准生成报告</div>
        
        <button class="btn-main" onclick="navPage('p-sd')">看完了，我有话想说...</button>
        <button class="btn-sub" onclick="resetToHome()">返回首页</button>
    </div>

    <div id="p-sd" class="glass" style="display:none;">
        <div class="ctrl-bar">
            <div class="ctrl-btn" onclick="navPage('p-report')">↩ 返回看报告</div>
            <div></div>
        </div>

        <h3 style="font-weight:400; letter-spacing:2px;">深夜树洞</h3>
        <textarea id="sd-input" placeholder="写下此刻最真实的感受..."></textarea>
        <p style="font-size:0.8rem; color:var(--accent); margin-bottom:10px;">“贴上一枚邮票，让这份沉重跨越星空”</p>
        <button class="btn-main" onclick="openPay()">投递这份心情</button>
    </div>

    <div id="p-echo" class="glass">
        <div id="echo-content" class="letter-content"></div>
        <button id="btn-restart" class="btn-main" style="display:none" onclick="resetToHome()">结束旅程，回到首页</button>
    </div>
</div>

<div id="pay-overlay" onclick="this.style.display='none'">
    <div class="pay-card" onclick="event.stopPropagation()">
        <p style="font-weight:bold; font-size:1.1rem;">贴上一枚心灵邮票</p>
        <img class="qr-img" src="https://s41.ax1x.com/2026/01/16/pZsJOS0.jpg">
        <p style="font-size:0.85rem; color:#666; margin-top:10px; line-height:1.5;">支付 1.25 元完成投递<br>这枚邮票将为你开启深度长回信</p>
        
        <button class="btn-main" onclick="finishPay()" style="margin-top:15px; padding:15px;">我已贴好，确认投递</button>
        <button class="btn-sub" onclick="document.getElementById('pay-overlay').style.display='none'" style="color:#999; margin-top:5px;">取消，返回修改</button>
    </div>
</div>

<script>
    const _DB = {
        PHQ9: ["做事提不起劲？","心情低落、忧郁或绝望？","入睡困难、易醒或睡得太多？","感到疲倦或没有活力？","食欲不振或吃得太多？","觉得自己很糟或很失败？","难以集中注意力？","动作缓慢或烦躁不安？","有不如死掉的念头？"],
        GAD7: ["感到紧张、焦虑或急躁？","无法停止或控制担心？","对各种事情担心过多？","很难放松下来？","由于不安而无法静坐？","变得容易烦躁或易怒？","感到好像有可怕的事会发生？"],
        PSS10: ["感到自己处理不力？","感到无法控制生活？","感到紧张或压力？","感到难以对付困难？","感到愤怒或恼火？","觉得自己无法胜任工作？","对意料外的事感到烦恼？","感到无法战胜困难？","无法控制重要的事？","感到事情如你所愿？"]
    };

    let _type = '', _idx = 0, _scoreStack = [], isMusicPlaying = false;

    function toggleMusic() {
        const audio = document.getElementById('bgm');
        if(!isMusicPlaying) { audio.play(); document.getElementById('m-btn').innerText = '🎵 旋律已启'; }
        else { audio.pause(); document.getElementById('m-btn').innerText = '🎵 旋律已停'; }
        isMusicPlaying = !isMusicPlaying;
    }

    function navPage(id) {
        ['p-home', 'p-test', 'p-report', 'p-sd', 'p-echo'].forEach(p => document.getElementById(p).style.display = 'none');
        document.getElementById(id).style.display = 'block';
        window.scrollTo(0, 0); 
    }

    function resetToHome() {
        _scoreStack = []; _idx = 0;
        document.getElementById('sd-input').value = '';
        document.getElementById('dom-crisis').style.display = 'none'; // 重置危机卡片
        navPage('p-home');
    }

    function runStart(type) {
        _type = type; _idx = 0; _scoreStack = [];
        navPage('p-test');
        updateQ();
    }

    function updateQ() {
        document.getElementById('q-txt').innerText = _DB[_type][_idx];
    }

    function runStep(s) {
        _scoreStack.push(s);
        _idx++;
        if (_idx < _DB[_type].length) updateQ(); else showReport();
    }

    function runBack() {
        if (_idx > 0) { _idx--; _scoreStack.pop(); updateQ(); }
    }

    function getScienceAnalysis(score, type) {
        // 危机干预逻辑检测
        let isCrisis = false;
        // 如果是 PHQ9，且总分>=20，或者第9题（索引8）得分>0，触发危机
        if (type === 'PHQ9' && (score >= 20 || _scoreStack[8] > 0)) {
            isCrisis = true;
        }

        if (type === 'PHQ9') {
            if (score <= 4) return { level: "状态良好", color: "var(--safe)", desc: "您的情绪目前处于非常平稳的水平，请继续保持健康的生活节奏。", isCrisis: false };
            if (score <= 9) return { level: "轻度抑郁", color: "var(--warning)", desc: "您可能正处于一个疲惫期。这只是心灵的小感冒，适当休息和倾诉会有很大改善。", isCrisis: false };
            if (score <= 14) return { level: "中度抑郁", color: "#f39c12", desc: "建议您多关注心理健康，寻找身边的支持力量，或者尝试专业的心理咨询。", isCrisis: false };
            if (score <= 19) return { level: "中重度状态", color: "#e67e22", desc: "您当前的痛苦程度较高。请不要独自硬扛，世界依然值得留恋，请及时寻求专业支持。", isCrisis: isCrisis };
            return { level: "重度状态", color: "var(--danger)", desc: "此刻的你承受着巨大的黑暗。请务必告诉身边的亲友，并向专业医疗机构寻求帮助。", isCrisis: true };
        }
        // ... GAD7 和 PSS10 逻辑保持不变
        if (type === 'GAD7') {
            if (score <= 4) return { level: "心境祥和", color: "var(--safe)", desc: "您现在的状态非常放松，能够很好地管理自己的思绪。" };
            if (score <= 9) return { level: "轻度焦虑", color: "var(--warning)", desc: "最近可能有些琐碎的事让你感到紧绷，试试深呼吸。" };
            return { level: "中重度焦虑", color: "var(--danger)", desc: "脑海里的噪音有些过载了。不必急着解决所有问题，给自己一段‘真空’时间。" };
        }
        return { level: "压力适中", color: "var(--accent)", desc: "根据 PSS-10 评估，您的心理韧性正在应对挑战，请继续关爱自己。" };
    }

    function showReport() {
        const total = _scoreStack.reduce((a, b) => a + b, 0);
        document.getElementById('dom-score').innerText = total;
        const analysis = getScienceAnalysis(total, _type);
        
        document.getElementById('dom-level').innerText = analysis.level;
        document.getElementById('dom-level').style.color = analysis.color;
        document.getElementById('dom-diag').innerText = analysis.desc;
        
        // 危机卡片显示控制
        if (analysis.isCrisis) {
            document.getElementById('dom-crisis').style.display = 'block';
        } else {
            document.getElementById('dom-crisis').style.display = 'none';
        }

        navPage('p-report');
        setTimeout(drawRadar, 200);
    }

    function openPay() {
        if(!document.getElementById('sd-input').value) return alert("哪怕写一个词也好呀...");
        document.getElementById('pay-overlay').style.display = 'flex';
    }

    function finishPay() {
        document.getElementById('pay-overlay').style.display = 'none';
        navPage('p-echo');
        const longLetter = `亲爱的伙伴：\n\n见信如面。在这个也许并不算太温柔的世界里，谢谢你愿意在这一刻停下来，把那些沉甸甸的心事托付给我。我读到了你刚才在树洞里写下的那些文字，我也听到了那些文字背后，你小心翼翼的呼吸和那些没能说出口的疲惫。\n\n我知道，你已经努力了很久。你努力在人群中扮演一个正常的、乐观的、称职的角色。你努力地对抗那些无端袭来的情绪潮汐，努力地不让身边的人担心。可是伙计，保险丝会烧断，是因为它正在拼命保护电路不被高温焚毁。你的那些“没力气”、“不开心”甚至是“想放弃”，其实都是你内心深处那个勇敢的小孩在对你说：“我真的太累了，请让我休息一下。”\n\n请允许我告诉你：崩溃并不是弱点，它只是生命在提醒你需要一次重启。正如黑夜不是为了吓唬路人，而是为了让疲惫的旅人拥抱睡眠。现在的你，不需要去和黑暗搏斗。试着在黑暗里坐一会儿，感受它的重量，也感受你依然存在的心跳。你依然拥有呼吸的能力，你依然拥有感受痛苦的能力，这本身就是你内在生命力依然在跳动的最有力证明。\n\n别去听那些催促你“变好”的声音。如果现在是寒冬，那就安安静静地冬眠。不要责怪自己没有开花，不要责怪自己不够挺拔。地底下的根，正在黑暗中悄悄汲取重生的养分。\n\n你以前总觉得自己要有用，要优秀，才值得被爱。但我想告诉你，你仅仅是活着，仅仅是此刻坐在这里，就已经非常有价值了。你的信心不需要靠别人来建立，它藏在你下一次深呼吸里，藏在你下一次推开窗户看的风景里。\n\n请相信，每一场暴雨之后，空气都会变得透明。你手中的那盏灯虽然微弱，但它从未熄灭。等这阵风过去，等这片云飘走，你会发现自己比想象中更坚韧。明天，我们不需要跨越什么雄关漫道，我们只需要喝一杯温热的水，看一次日出。\n\n我会一直在这里，守着你的树洞，陪着你等天亮。你并不孤单。\n\n—— 你的伙伴 [你好吗]`;
        typeWrite(longLetter);
    }

    function typeWrite(text) {
        let i = 0; const dom = document.getElementById('echo-content'); dom.innerText = '';
        const timer = setInterval(() => {
            if (i < text.length) { dom.innerText += text.charAt(i++); window.scrollTo(0, document.body.scrollHeight); }
            else { clearInterval(timer); document.getElementById('btn-restart').style.display = 'block'; }
        }, 55);
    }

    function drawRadar() {
        const canvas = document.getElementById('dom-radar');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = 300 * dpr; canvas.height = 240 * dpr;
        ctx.scale(dpr, dpr);
        const cx = 150, cy = 120, r = 70;
        const labels = ["心境", "生理", "认知", "自我"];
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        for (let j = 1; j <= 3; j++) {
            ctx.beginPath();
            for (let i = 0; i < 4; i++) {
                let ang = i * Math.PI/2 - Math.PI/2;
                let x = cx + (r * j / 3) * Math.cos(ang);
                let y = cy + (r * j / 3) * Math.sin(ang);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.closePath(); ctx.stroke();
        }
        ctx.fillStyle = "rgba(162, 155, 254, 0.5)";
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
            let ang = i * Math.PI/2 - Math.PI/2;
            let val = [0.8, 0.7, 0.6, 0.9][i] * r;
            let x = cx + val * Math.cos(ang);
            let y = cy + val * Math.sin(ang);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "12px sans-serif";
        labels.forEach((t, i) => {
            let ang = i * Math.PI/2 - Math.PI/2;
            ctx.fillText(t, cx + (r+15)*Math.cos(ang) - 10, cy + (r+15)*Math.sin(ang) + 5);
        });
    }
</script>
</body>
</html>
